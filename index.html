<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>🩺 พี่หมอใจดี - เพื่อนคู่คิดสุขภาพนักเรียน</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #00acc1;
      --secondary-color: #e0f7fa;
      --accent-color: #ff8a80;
    }

    body {
      font-family: 'Prompt', sans-serif;
      background-color: #f0faff;
      background-image: radial-gradient(#d1eefc 1.5px, transparent 1.5px);
      background-size: 25px 25px;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #37474f;
    }

    .app-container {
      background-color: #ffffff;
      border-radius: 45px;
      box-shadow: 0 25px 60px rgba(0, 172, 193, 0.2);
      padding: 35px;
      text-align: center;
      width: 92%;
      max-width: 450px;
      border: 6px solid white;
      position: relative;
      overflow: hidden;
    }

    /* ตกแต่งหัวข้อให้ดูเป็นมิตร */
    .header-section {
      margin-bottom: 20px;
    }

    .mascot-icon {
      font-size: 60px;
      margin-bottom: 10px;
      display: inline-block;
      animation: wiggle 2s infinite ease-in-out;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    h1 {
      color: var(--primary-color);
      font-size: 30px;
      margin: 0;
      font-weight: 600;
    }

    .subtitle {
      color: #78909c;
      font-size: 18px;
      margin-top: 5px;
    }

    /* ส่วนของปุ่มทางลัด (Quick Buttons) */
    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
    }

    .quick-btn {
      background-color: var(--secondary-color);
      border: 2px solid #b2ebf2;
      border-radius: 20px;
      padding: 10px;
      font-family: 'Prompt', sans-serif;
      font-size: 15px;
      color: #007c91;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .quick-btn:hover {
      background-color: var(--primary-color);
      color: white;
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 172, 193, 0.3);
    }

    /* กล่องแชท */
    .chat-wrapper {
      position: relative;
      border-radius: 30px;
      overflow: hidden;
      border: 3px solid #e0f2f1;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    iframe {
      border: none;
      display: block;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #b0bec5;
    }

    /* ปรับปรุงให้เหมาะกับมือถือ */
    @media (max-width: 480px) {
      .app-container { padding: 25px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header-section">
      <div class="mascot-icon">👩‍⚕️</div>
      <h1>พี่หมอใจดี</h1>
      <p class="subtitle">บอกอาการ หรือกดปุ่มได้เลยครับ</p>
    </div>

    <div class="button-grid">
      <button class="quick-btn" onclick="sendMessage('ปวดหัว')">🤕 ปวดหัว</button>
      <button class="quick-btn" onclick="sendMessage('ปวดท้อง')">🤢 ปวดท้อง</button>
      <button class="quick-btn" onclick="sendMessage('มีไข้')">🤒 มีไข้</button>
      <button class="quick-btn" onclick="sendMessage('เป็นแผล')">🩹 เป็นแผล</button>
    </div>
    
    <div class="chat-wrapper">
      <iframe
        id="chat-frame"
        allow="microphone;"
        width="100%"
        height="400"
        src="https://console.dialogflow.com/api-client/demo/embedded/2b5678f4-9ae3-4f9a-9de6-e374031c2a8a">
      </iframe>
    </div>

    <div class="footer">
      ส่งต่อความห่วงใยจากครูพละ ❤️
    </div>
  </div>

  <script>
    // ฟังก์ชันสำหรับส่งข้อความเมื่อกดปุ่ม (จำลองการพิมพ์เข้าไปใน iframe)
    function sendMessage(text) {
  Swal.fire({
    title: 'ส่งอาการให้พี่หมอ',
    text: 'ลองพูดว่า "' + text + '" หรือพิมพ์ในช่องแชทได้เลยครับ',
    icon: 'info',
    confirmButtonText: 'รับทราบ!',
    confirmButtonColor: '#00acc1' // ใช้รหัสสีฟ้าเดียวกับหัวข้อเว็บเรา
  });

  </script>

</body>
</html>
