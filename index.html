<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>🩺 พี่หมอใจดี - ระบบช่วยเหลือนักเรียน_ครูพละ_</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    /* 1. โทนสีพาสเทลและพื้นหลังแบบมีลูกเล่น */
    body {
      font-family: 'Prompt', sans-serif;
      background-color: #f0faff; /* สีฟ้าไอศกรีม */
      background-image: radial-gradient(#ffffff 2px, transparent 2px); /* ลายจุด Polka Dot เล็กๆ */
      background-size: 30px 30px;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* 2. ความโค้งมนและเอฟเฟกต์ Glow */
    .app-container {
      background-color: #ffffff;
      border-radius: 40px; /* โค้งมนพิเศษดูใจดี */
      box-shadow: 0 20px 50px rgba(135, 206, 235, 0.3); /* เงาสีฟ้าอ่อนๆ */
      padding: 40px;
      text-align: center;
      width: 90%;
      max-width: 420px;
      border: 5px solid #b2ebf2; /* ขอบสีพาสเทล */
      transition: transform 0.3s ease; /* เตรียมไว้สำหรับการเคลื่อนไหว */
    }

    /* 3. การเคลื่อนไหว (Animation) เมื่อเอาเมาส์ไปชี้ */
    .app-container:hover {
      transform: translateY(-10px); /* ลอยขึ้นเล็กน้อย */
    }

    h1 {
      color: #00897b;
      font-size: 28px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .subtitle {
      color: #78909c;
      font-size: 16px;
      margin-bottom: 25px;
    }

    iframe {
      border: 4px solid #f1f8e9;
      border-radius: 30px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
      background-color: #fafafa;
    }

    .footer-text {
      margin-top: 20px;
      font-size: 13px;
      color: #9e9e9e;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h1><span>🩺</span> พี่หมอใจดี</h1>
    <div class="subtitle">มีอะไรให้พี่หมอช่วยไหมครับ?</div>
    
    <iframe
      allow="microphone;"
      width="100%"
      height="450"
      src="https://console.dialogflow.com/api-client/demo/embedded/2b5678f4-9ae3-4f9a-9de6-e374031c2a8a">
    </iframe>

    <div class="footer-text">
      บันทึกข้อมูลด้วยความรัก 💖 โดยห้องพยาบาล
    </div>
  </div>

</body>
</html>
