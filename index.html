<!DOCTYPE html>
<html lang="th">
<head>
  <script>
  // บังคับใช้ HTTPS เพื่อให้ระบบไมโครโฟนทำงานได้
  if (location.protocol !== 'https:') {
      location.replace(`https:${location.href.substring(location.protocol.length)}`);
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

  <meta charset="utf-8">
  <title>🩺 พี่หมอใจดี - เพื่อนคู่คิดสุขภาพนักเรียน</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #00acc1;
      --secondary-color: #e0f7fa;
      --accent-color: #ff5252;
      --text-color: #37474f;
    }

    body {
      font-family: 'Prompt', sans-serif;
      background-color: #f0faff;
      background-image: radial-gradient(#b2ebf2 2px, transparent 2px);
      background-size: 30px 30px;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-color);
      user-select: none; 
    }

    /* 🌟 เพิ่มสไตล์สำหรับหน้าจอเริ่มต้น (Start Screen) */
    .start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #e0f7fa;
      background-image: radial-gradient(#b2ebf2 2px, transparent 2px);
      background-size: 30px 30px;
      z-index: 99999; /* ให้อยู่บนสุด */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .start-btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 20px 50px;
      font-size: 30px;
      font-family: 'Prompt', sans-serif;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(255, 82, 82, 0.3);
      animation: pulse-start 1.5s infinite;
      margin-top: 30px;
    }

    @keyframes pulse-start {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .app-container {
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 40px;
      box-shadow: 0 20px 50px rgba(0, 172, 193, 0.15);
      padding: 30px 20px;
      text-align: center;
      width: 95%;
      max-width: 500px;
      border: 5px solid white;
    }

    .mascot-icon {
      font-size: 70px;
      margin-bottom: 5px;
      animation: float 3s ease-in-out infinite;
    }

    .talking-mascot {
      font-size: 75px;
      margin: 15px 0;
      display: inline-block;
      animation: talk-bounce 0.5s infinite alternate ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes talk-bounce {
      0% { transform: scale(1) translateY(0); }
      100% { transform: scale(1.1) translateY(-5px); }
    }

    h1 {
      color: var(--primary-color);
      font-size: 32px;
      margin: 0;
      font-weight: 600;
    }

    .subtitle {
      color: #78909c;
      font-size: 16px;
      margin-top: 5px;
      margin-bottom: 25px;
    }

    .mic-container {
      margin: 30px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .mic-button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 20px 40px;
      font-size: 24px;
      font-family: 'Prompt', sans-serif;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 10px 20px rgba(0, 172, 193, 0.3);
      transition: all 0.3s ease;
    }

    .mic-button.listening {
      background-color: var(--accent-color);
      box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.7);
      animation: pulse-wave 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
      transform: scale(1.05);
    }

    @keyframes pulse-wave {
      to { box-shadow: 0 0 0 40px rgba(255, 82, 82, 0); }
    }

    .guide-text {
      font-size: 14px;
      color: #90a4ae;
      margin-top: 15px;
      background-color: var(--secondary-color);
      padding: 5px 15px;
      border-radius: 20px;
      display: inline-block;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 25px;
    }

    .quick-btn {
      background-color: white;
      border: 2px solid #b2ebf2;
      border-radius: 25px;
      padding: 12px;
      font-family: 'Prompt', sans-serif;
      font-size: 16px;
      color: #007c91;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .quick-btn:active {
      background-color: var(--secondary-color);
      transform: scale(0.95);
    }

    df-messenger {
      --df-messenger-bot-message: #e0f7fa;
      --df-messenger-button-titlebar-color: #00acc1;
      --df-messenger-chat-background-color: #fafafa;
      --df-messenger-font-color: #37474f;
      --df-messenger-send-icon: #00acc1;
      --df-messenger-user-message: #b2ebf2;
      z-index: 999;
    }
    
    .footer {
      margin-top: 25px;
      font-size: 13px;
      color: #b0bec5;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; 
      height: 0;
      margin-top: 15px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div id="startScreen" class="start-overlay">
    <div style="font-size: 120px; animation: float 3s infinite;">👩‍⚕️</div>
    <h1 style="color: #00acc1; font-size: 40px; margin-top: 20px;">ห้องพยาบาลดวงมณี</h1>
    <button class="start-btn" onclick="startApp()">👉 แตะเพื่อเริ่มใช้งาน 👈</button>
  </div>

  <div class="app-container">
    <div class="header-section">
      <div class="mascot-icon">👩‍⚕️</div>
      <h1>พี่หมอใจดี</h1>
      <p class="subtitle">มีอะไรให้พี่หมอช่วยไหมคนเก่ง?</p>
    </div>

    <div class="mic-container">
      <button id="micBtn" class="mic-button" onclick="startMic()">
        <span class="mic-icon" id="micIcon">🎤</span>
        <span id="micText">กดพูดได้เลย</span>
      </button>
      <div class="guide-text">💡 ลองพูดว่า "ปวดหัว" หรือ "หกล้ม"</div>
    </div>

    <div class="button-grid">
      <button class="quick-btn" onclick="sendMessage('ปวดหัว')">🤕 ปวดหัว</button>
      <button class="quick-btn" onclick="sendMessage('ปวดท้อง')">🤢 ปวดท้อง</button>
      <button class="quick-btn" onclick="sendMessage('หกล้ม')">🩹 มีแผล/หกล้ม</button>
      <button class="quick-btn" onclick="sendMessage('โดนแกล้ง')">😢 โดนเพื่อนแกล้ง</button>
    </div>

    <div class="footer">
      ❤️ เพื่อนคู่คิดสุขภาพนักเรียน
    </div>
  </div>

  <df-messenger
    chat-title="คุยกับพี่หมอ 🩺"
    agent-id="2b5678f4-9ae3-4f9a-9de6-e374031c2a8a"
    language-code="th"
    chat-icon="https://cdn-icons-png.flaticon.com/512/883/883407.png">
  </df-messenger>

  <script>
    // ฟังก์ชันเริ่มแอป
    function startApp() {
      document.getElementById('startScreen').style.display = 'none';
      sendMessage('สวัสดี'); 
    }

    // ฟังก์ชันส่งข้อความ (แบบเปิด-ปิดแชทแวบเดียว)
    function sendMessage(text, retryCount = 0) {
      const dfMessenger = document.querySelector('df-messenger');
      
      // 🌟 สั่งเปิดหน้าต่างแชทขึ้นมาก่อน เพื่อให้ช่องพิมพ์ข้อความถูกสร้างขึ้นมา
      if(dfMessenger) dfMessenger.setAttribute('expand', 'true'); 

      setTimeout(() => {
        try {
          const chat = dfMessenger.shadowRoot.querySelector('df-messenger-chat');
          if (!chat) throw new Error("ยังโหลดไม่เสร็จ");

          const userInput = chat.shadowRoot.querySelector('df-messenger-user-input');
          const inputBox = userInput.shadowRoot.querySelector('input');
          const sendButton = userInput.shadowRoot.querySelector('button');

          // พิมพ์ข้อความและกดส่ง
          inputBox.value = text;
          sendButton.click();
          
          // 🌟 พอส่งเสร็จ ให้รีบปิดหน้าต่างแชทซ่อนกลับไปทันที (เด็กๆ จะมองแทบไม่ทัน)
          setTimeout(() => {
            if(dfMessenger) dfMessenger.removeAttribute('expand');
          }, 100);

        } catch (e) {
          console.log("กำลังรอโหลด...");
          if (retryCount < 5) {
            sendMessage(text, retryCount + 1); 
          }
        }
      }, 500);
    }

    // ฟังก์ชันไมโครโฟน
    function startMic() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      if (!SpeechRecognition) {
        Swal.fire('อ๊ะ!', 'อุปกรณ์นี้ไม่รองรับระบบไมโครโฟน ลองกดปุ่มด้านล่างแทนนะจ๊ะ', 'warning');
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'th-TH'; 
      recognition.interimResults = false;

      const btn = document.getElementById('micBtn');
      const text = document.getElementById('micText');
      const icon = document.getElementById('micIcon');

      recognition.start();

      recognition.onstart = function() {
        btn.classList.add('listening');
        text.innerText = "กำลังฟัง...";
        icon.innerText = "👂";
      };

      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript; 
        
        Swal.fire({
          title: '<span style="color: #00acc1; font-family: Prompt;">ได้ยินว่า: "' + transcript + '"</span>',
          html: `<div style="font-size: 60px; margin: 10px 0; animation: float 1s infinite alternate;">👩‍⚕️💭</div>
                 <h4 style="color: #78909c;">รอพี่หมอคิดแป๊บนึงนะ...</h4>`,
          showConfirmButton: false,
          timer: 1500 
        }).then(() => {
          sendMessage(transcript); 
        });
      };

      recognition.onend = function() {
        btn.classList.remove('listening');
        text.innerText = "กดพูดได้เลย";
        icon.innerText = "🎤";
      };

      recognition.onerror = function(event) {
        btn.classList.remove('listening');
        text.innerText = "กดพูดได้เลย";
        icon.innerText = "🎤";
      };
    }

    window.speechSynthesis.onvoiceschanged = function() {
      window.speechSynthesis.getVoices();
    };

    // ฟังก์ชันระบบเสียงพูดตอบกลับ + หน้าต่างโชว์ข้อความและวิดีโอ
    window.addEventListener('df-response-received', function (event) {
      try {
        const rawBotReply = event.detail.response.queryResult.fulfillmentText;
        
        if (rawBotReply) {
          let autoCloseTimer; 
          let videoHtml = '';
          let textForDisplay = rawBotReply;

          const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/i;
          const match = rawBotReply.match(ytRegex);

          if (match && match[1]) {
            const videoId = match[1];
            videoHtml = `
              <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
              </div>`;
            textForDisplay = rawBotReply.replace(match[0], '').trim();
          }

          Swal.fire({
            title: '<span style="color: #00acc1; font-family: Prompt; font-size: 26px;">พี่หมอใจดีบอกว่า...</span>',
            html: `
              <div class="talking-mascot">👩‍⚕️💬</div>
              <h3 style="color: #37474f; font-family: Prompt; font-weight: 400; line-height: 1.6; padding: 0 10px;">"${textForDisplay}"</h3>
              ${videoHtml}
            `,
            showConfirmButton: true, 
            confirmButtonText: 'รับทราบค่ะ/ครับ 👍',
            confirmButtonColor: '#00acc1',
            backdrop: `rgba(224, 247, 250, 0.95)`, 
            allowOutsideClick: false,
            width: '90%' 
          }).then((result) => {
            if (result.isConfirmed) {
              window.speechSynthesis.cancel();
              clearTimeout(autoCloseTimer);
            }
          });

          let cleanTextToSpeak = textForDisplay.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');

          const speech = new SpeechSynthesisUtterance(cleanTextToSpeak);
          speech.lang = 'th-TH'; 
          
          const voices = window.speechSynthesis.getVoices();
          const thaiVoices = voices.filter(v => v.lang.includes('th'));
          
          if (thaiVoices.length > 0) {
            let femaleVoice = thaiVoices.find(v => v.name.includes('Google') || v.name.includes('Kanya') || v.name.includes('Premwadee'));
            if (!femaleVoice) {
              femaleVoice = thaiVoices[0]; 
            }
            speech.voice = femaleVoice;
          }

          speech.rate = 1.0;  
          speech.pitch = 1.1;    
          
          window.speechSynthesis.cancel(); 
          window.speechSynthesis.speak(speech); 

          speech.onend = function() {
             if (!match) {
               autoCloseTimer = setTimeout(() => {
                 Swal.close();
               }, 2000); 
             }
          };
          
        }
      } catch (error) {
        console.error("ระบบเสียงพูดขัดข้อง:", error);
      }
    });
  </script>

</body>
</html>
