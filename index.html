<!DOCTYPE html>
<html lang="th">
<head>
  <script>
  // บังคับให้ใช้ HTTPS เพื่อความปลอดภัย
  if (location.protocol !== 'https:') {
      location.replace(`https:${location.href.substring(location.protocol.length)}`);
  }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
  
  <meta charset="utf-8">
  <title>🩺 พี่หมอใจดี - เพื่อนคู่คิดสุขภาพนักเรียน</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #00acc1;
      --secondary-color: #e0f7fa;
      --accent-color: #ff8a80;
    }

    body {
      font-family: 'Prompt', sans-serif;
      background-color: #f0faff;
      background-image: radial-gradient(#d1eefc 1.5px, transparent 1.5px);
      background-size: 25px 25px;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #37474f;
    }

    .app-container {
      background-color: #ffffff;
      border-radius: 45px;
      box-shadow: 0 25px 60px rgba(0, 172, 193, 0.2);
      padding: 35px;
      text-align: center;
      width: 92%;
      max-width: 450px;
      border: 6px solid white;
      position: relative;
      overflow: hidden;
    }

    .header-section {
      margin-bottom: 20px;
    }

    .mascot-icon {
      font-size: 60px;
      margin-bottom: 10px;
      display: inline-block;
      animation: wiggle 2s infinite ease-in-out;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    h1 {
      color: var(--primary-color);
      font-size: 30px;
      margin: 0;
      font-weight: 600;
    }

    .subtitle {
      color: #78909c;
      font-size: 18px;
      margin-top: 5px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 30px 0;
    }

    .quick-btn {
      background-color: var(--secondary-color);
      border: 2px solid #b2ebf2;
      border-radius: 20px;
      padding: 15px 10px;
      font-family: 'Prompt', sans-serif;
      font-size: 16px;
      color: #007c91;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .quick-btn:hover {
      background-color: var(--primary-color);
      color: white;
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 172, 193, 0.3);
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #b0bec5;
    }

    /* ปรับปรุง df-messenger ให้สีเข้ากับแอปของเรา */
    df-messenger {
      --df-messenger-bot-message: #e0f7fa;
      --df-messenger-button-titlebar-color: #00acc1;
      --df-messenger-chat-background-color: #fafafa;
      --df-messenger-font-color: #37474f;
      --df-messenger-send-icon: #00acc1;
      --df-messenger-user-message: #b2ebf2;
    }

    @media (max-width: 480px) {
      .app-container { padding: 25px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header-section">
      <div class="mascot-icon">👩‍⚕️</div>
      <h1>พี่หมอใจดี</h1>
      <p class="subtitle">เลือกอาการป่วยด้านล่างได้เลยครับ</p>
    </div>

    <div class="button-grid">
      <button class="quick-btn" onclick="sendMessage('ปวดหัว')">🤕 ปวดหัว</button>
      <button class="quick-btn" onclick="sendMessage('ปวดท้อง')">🤢 ปวดท้อง</button>
      <button class="quick-btn" onclick="sendMessage('มีไข้')">🤒 มีไข้</button>
      <button class="quick-btn" onclick="sendMessage('เป็นแผล')">🩹 เป็นแผล</button>
    </div>

    <div class="footer">
      ส่งต่อความห่วงใยจากครูพละ ❤️
    </div>
  </div>

  <df-messenger
    intent="WELCOME"
    chat-title="คุยกับพี่หมอ 🩺"
    agent-id="2b5678f4-9ae3-4f9a-9de6-e374031c2a8a"
    language-code="th"
    chat-icon="https://cdn-icons-png.flaticon.com/512/883/883407.png">
  </df-messenger>

  <script>
    function sendMessage(text) {
      // ขั้นที่ 1: สั่งให้กล่องแชทของ Google เปิดขยายขึ้นมา
      const dfMessenger = document.querySelector('df-messenger');
      dfMessenger.setAttribute('expand', 'true');

      // ขั้นที่ 2: แสดงกล่องข้อความแนะนำตัวสวยๆ
      Swal.fire({
        title: 'พี่หมอรออยู่!',
        text: 'กล่องแชทเปิดแล้ว พิมพ์หรือพูดว่า "' + text + '" เข้ามาได้เลยครับ',
        icon: 'success',
        confirmButtonText: 'ตกลง',
        confirmButtonColor: '#00acc1',
        timer: 4000 // ปิดอัตโนมัติใน 4 วินาทีเพื่อให้น้องๆ ไปพิมพ์ต่อได้เลย
      });
    }
  </script>

</body>
</html>
